<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Village Field Survey</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<style>
  html, body { margin:0; padding:0; height:100%; font-family: -apple-system, Arial, sans-serif; }
  #map { position:absolute; top:0; left:0; right:0; bottom:160px; }
  #panel { position:absolute; bottom:0; left:0; right:0; height:160px; background:#fff;
           border-top:2px solid #ccc; box-shadow:0 -2px 6px rgba(0,0,0,0.15); overflow-y:auto;
           box-sizing:border-box; padding:8px; z-index:1000; }
  .row { display:flex; gap:6px; flex-wrap:wrap; align-items:center; margin-bottom:6px; }
  select, button, input { font-size:15px; padding:8px 10px; border-radius:6px; border:1px solid #999; }
  button { cursor:pointer; background:#2c7be5; color:#fff; border:none; }
  button:disabled { background:#bbb; }
  button.secondary { background:#888; }
  button.danger { background:#d9534f; }
  #status { font-size:13px; color:#333; }
  #featureList { font-size:13px; max-height:55px; overflow-y:auto; border:1px solid #eee; padding:4px; border-radius:4px; }
  .feature-item { display:flex; justify-content:space-between; align-items:center; padding:2px 0; border-bottom:1px solid #f0f0f0; }
  .feature-item button { padding:2px 8px; font-size:12px; }

  /* Modal */
  #modalOverlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0;
                  background:rgba(0,0,0,0.4); z-index:2000; align-items:center; justify-content:center; }
  #modalBox { background:#fff; border-radius:8px; padding:16px; width:90%; max-width:380px; }
  #modalBox label { display:block; margin-top:8px; font-size:13px; font-weight:bold; }
  #modalBox input, #modalBox select, #modalBox textarea { width:100%; box-sizing:border-box; margin-top:4px; }
  #modalBox .row { margin-top:14px; justify-content:flex-end; }
</style>
</head>
<body>

<div id="map"></div>

<div id="panel">
  <div class="row">
    <label for="modeSelect"><b>Layer:</b></label>
    <select id="modeSelect">
      <option value="boundary">Village Boundary (polygon)</option>
      <option value="roads">Road (line)</option>
    </select>
    <button id="locateBtn" class="secondary">Locate me</button>
  </div>
  <div class="row">
    <button id="recordBtn">Start Recording</button>
    <button id="pauseBtn" disabled>Pause</button>
    <button id="resumeBtn" disabled>Resume</button>
    <button id="finishBtn" disabled>Finish</button>
    <button id="cancelBtn" class="danger" disabled>Cancel</button>
  </div>
  <div id="status">Ready. Select a layer and tap "Start Recording" to begin walking.</div>
  <div class="row" style="margin-top:6px;">
    <button id="exportBoundaryBtn" class="secondary">Export Boundary GeoJSON</button>
    <button id="exportRoadsBtn" class="secondary">Export Roads GeoJSON</button>
    <button id="clearAllBtn" class="danger">Clear All Data</button>
  </div>
  <div id="featureList"></div>
</div>

<!-- Attribute entry modal -->
<div id="modalOverlay">
  <div id="modalBox">
    <h3 id="modalTitle" style="margin:0;">Feature details</h3>
    <div id="boundaryFields">
      <label>Name</label>
      <input type="text" id="f_bound_name" placeholder="e.g. Katwaria Sarai Abadi Boundary">
      <label>Remarks</label>
      <textarea id="f_bound_remarks" rows="2"></textarea>
    </div>
    <div id="roadFields" style="display:none;">
      <label>Road Name / Number</label>
      <input type="text" id="f_road_name" placeholder="e.g. Lane 3 / KS Main Road">
      <label>Width (meters)</label>
      <input type="number" id="f_width_m" step="0.1" min="0">
      <label>Road Type</label>
      <select id="f_road_type">
        <option>Main Road</option>
        <option>Internal Lane</option>
        <option>Footpath</option>
        <option>Service Road</option>
        <option>Other</option>
      </select>
      <label>Remarks</label>
      <textarea id="f_road_remarks" rows="2"></textarea>
    </div>
    <div class="row">
      <button id="modalCancel" class="secondary">Discard</button>
      <button id="modalSave">Save</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script>
// ---------- Map setup ----------
const map = L.map('map').setView([28.5419, 77.1863], 17); // Katwaria Sarai
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 20,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

let currentMarker = null;

// ---------- State ----------
let mode = 'boundary';
let recording = false;
let watchId = null;
let currentTrack = []; // array of [lat, lon]
let liveLine = null;

let boundaryFeatures = JSON.parse(localStorage.getItem('boundaryFeatures') || '[]');
let roadFeatures = JSON.parse(localStorage.getItem('roadFeatures') || '[]');
let savedLayers = [];

const MIN_DISTANCE_M = 2; // minimum movement before adding a new point

// ---------- Helpers ----------
function haversine(a, b) {
  const R = 6371000;
  const toRad = x => x * Math.PI / 180;
  const dLat = toRad(b[0]-a[0]);
  const dLon = toRad(b[1]-a[1]);
  const lat1 = toRad(a[0]), lat2 = toRad(b[0]);
  const h = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function redrawSaved() {
  savedLayers.forEach(l => map.removeLayer(l));
  savedLayers = [];
  boundaryFeatures.forEach(f => {
    const latlngs = f.geometry.coordinates[0].map(c => [c[1], c[0]]);
    const poly = L.polygon(latlngs, {color:'green', weight:2, fillOpacity:0.1}).addTo(map);
    poly.bindPopup(`<b>${f.properties.bound_name || '(unnamed)'}</b><br>${f.properties.remarks || ''}`);
    savedLayers.push(poly);
  });
  roadFeatures.forEach(f => {
    const latlngs = f.geometry.coordinates.map(c => [c[1], c[0]]);
    const line = L.polyline(latlngs, {color:'red', weight:3}).addTo(map);
    line.bindPopup(`<b>${f.properties.road_name || '(unnamed)'}</b><br>Type: ${f.properties.road_type}<br>Width: ${f.properties.width_m} m<br>${f.properties.remarks || ''}`);
    savedLayers.push(line);
  });
}

function renderFeatureList() {
  const el = document.getElementById('featureList');
  let html = '';
  boundaryFeatures.forEach((f, i) => {
    html += `<div class="feature-item"><span>[Boundary] ${f.properties.bound_name || '(unnamed)'}</span><button onclick="deleteFeature('boundary',${i})">Delete</button></div>`;
  });
  roadFeatures.forEach((f, i) => {
    html += `<div class="feature-item"><span>[Road] ${f.properties.road_name || '(unnamed)'} (${f.properties.road_type}, ${f.properties.width_m}m)</span><button onclick="deleteFeature('roads',${i})">Delete</button></div>`;
  });
  el.innerHTML = html || '<i>No features saved yet.</i>';
}

function deleteFeature(layer, idx) {
  if (!confirm('Delete this feature?')) return;
  if (layer === 'boundary') boundaryFeatures.splice(idx,1);
  else roadFeatures.splice(idx,1);
  persist();
  redrawSaved();
  renderFeatureList();
}

function persist() {
  localStorage.setItem('boundaryFeatures', JSON.stringify(boundaryFeatures));
  localStorage.setItem('roadFeatures', JSON.stringify(roadFeatures));
}

function todayStr() {
  return new Date().toISOString().slice(0,10);
}

// ---------- Recording controls ----------
document.getElementById('modeSelect').addEventListener('change', e => { mode = e.target.value; });

document.getElementById('locateBtn').addEventListener('click', () => {
  if (!navigator.geolocation) { alert('Geolocation not supported in this browser.'); return; }
  navigator.geolocation.getCurrentPosition(pos => {
    const ll = [pos.coords.latitude, pos.coords.longitude];
    map.setView(ll, 18);
    if (currentMarker) map.removeLayer(currentMarker);
    currentMarker = L.marker(ll).addTo(map).bindPopup(`Accuracy: ${pos.coords.accuracy.toFixed(1)} m`).openPopup();
  }, err => alert('Location error: ' + err.message), {enableHighAccuracy:true});
});

document.getElementById('recordBtn').addEventListener('click', startRecording);
document.getElementById('pauseBtn').addEventListener('click', pauseRecording);
document.getElementById('resumeBtn').addEventListener('click', startRecording);
document.getElementById('finishBtn').addEventListener('click', finishRecording);
document.getElementById('cancelBtn').addEventListener('click', cancelRecording);

function startRecording() {
  if (!navigator.geolocation) { alert('Geolocation not supported in this browser.'); return; }
  recording = true;
  document.getElementById('recordBtn').disabled = true;
  document.getElementById('pauseBtn').disabled = false;
  document.getElementById('resumeBtn').disabled = true;
  document.getElementById('finishBtn').disabled = false;
  document.getElementById('cancelBtn').disabled = false;
  document.getElementById('modeSelect').disabled = true;

  if (!liveLine) {
    liveLine = L.polyline([], {color:'orange', weight:4, dashArray:'4,4'}).addTo(map);
  }

  watchId = navigator.geolocation.watchPosition(pos => {
    const ll = [pos.coords.latitude, pos.coords.longitude];
    if (currentMarker) map.removeLayer(currentMarker);
    currentMarker = L.circleMarker(ll, {radius:6, color:'blue'}).addTo(map);

    if (currentTrack.length === 0 || haversine(currentTrack[currentTrack.length-1], ll) >= MIN_DISTANCE_M) {
      currentTrack.push(ll);
      liveLine.setLatLngs(currentTrack);
      map.panTo(ll);
    }
    setStatus(`Recording ${mode}... ${currentTrack.length} points captured. Accuracy: ${pos.coords.accuracy.toFixed(1)} m`);
  }, err => {
    setStatus('GPS error: ' + err.message);
  }, {enableHighAccuracy:true, maximumAge:0});
}

function pauseRecording() {
  if (watchId !== null) navigator.geolocation.clearWatch(watchId);
  watchId = null;
  document.getElementById('pauseBtn').disabled = true;
  document.getElementById('resumeBtn').disabled = false;
  setStatus(`Paused. ${currentTrack.length} points captured so far. Tap Resume to continue, or Finish to end this feature.`);
}

function cancelRecording() {
  if (watchId !== null) navigator.geolocation.clearWatch(watchId);
  watchId = null;
  recording = false;
  currentTrack = [];
  if (liveLine) { map.removeLayer(liveLine); liveLine = null; }
  resetButtons();
  setStatus('Cancelled. Ready to start again.');
}

function resetButtons() {
  document.getElementById('recordBtn').disabled = false;
  document.getElementById('recordBtn').textContent = 'Start Recording';
  document.getElementById('pauseBtn').disabled = true;
  document.getElementById('resumeBtn').disabled = true;
  document.getElementById('finishBtn').disabled = true;
  document.getElementById('cancelBtn').disabled = true;
  document.getElementById('modeSelect').disabled = false;
}

function finishRecording() {
  if (watchId !== null) navigator.geolocation.clearWatch(watchId);
  watchId = null;
  if (currentTrack.length < (mode === 'boundary' ? 3 : 2)) {
    alert(`Not enough points captured yet (${currentTrack.length}). Keep walking and recording.`);
    // re-arm watch
    startRecording();
    return;
  }
  openModal();
}

// ---------- Attribute modal ----------
function openModal() {
  document.getElementById('modalOverlay').style.display = 'flex';
  if (mode === 'boundary') {
    document.getElementById('modalTitle').textContent = 'Boundary details';
    document.getElementById('boundaryFields').style.display = 'block';
    document.getElementById('roadFields').style.display = 'none';
  } else {
    document.getElementById('modalTitle').textContent = 'Road details';
    document.getElementById('boundaryFields').style.display = 'none';
    document.getElementById('roadFields').style.display = 'block';
  }
}

function closeModal() {
  document.getElementById('modalOverlay').style.display = 'none';
}

document.getElementById('modalCancel').addEventListener('click', () => {
  closeModal();
  cancelRecording();
});

document.getElementById('modalSave').addEventListener('click', () => {
  if (mode === 'boundary') {
    let coords = currentTrack.map(c => [c[1], c[0]]); // lon, lat
    if (coords.length > 0 && (coords[0][0] !== coords[coords.length-1][0] || coords[0][1] !== coords[coords.length-1][1])) {
      coords.push(coords[0]); // close the ring
    }
    const feature = {
      type: 'Feature',
      geometry: { type: 'Polygon', coordinates: [coords] },
      properties: {
        bound_name: document.getElementById('f_bound_name').value || '',
        remarks: document.getElementById('f_bound_remarks').value || '',
        date_cap: todayStr()
      }
    };
    boundaryFeatures.push(feature);
  } else {
    const coords = currentTrack.map(c => [c[1], c[0]]); // lon, lat
    const feature = {
      type: 'Feature',
      geometry: { type: 'LineString', coordinates: coords },
      properties: {
        road_name: document.getElementById('f_road_name').value || '',
        width_m: parseFloat(document.getElementById('f_width_m').value) || 0,
        road_type: document.getElementById('f_road_type').value,
        remarks: document.getElementById('f_road_remarks').value || '',
        date_cap: todayStr()
      }
    };
    roadFeatures.push(feature);
  }
  persist();
  redrawSaved();
  renderFeatureList();

  // reset form + state
  document.getElementById('f_bound_name').value = '';
  document.getElementById('f_bound_remarks').value = '';
  document.getElementById('f_road_name').value = '';
  document.getElementById('f_width_m').value = '';
  document.getElementById('f_road_remarks').value = '';
  currentTrack = [];
  if (liveLine) { map.removeLayer(liveLine); liveLine = null; }
  closeModal();
  resetButtons();
  setStatus('Saved! Ready to record the next feature.');
});

// ---------- Export ----------
function downloadGeoJSON(features, filename) {
  const fc = { type: 'FeatureCollection', features: features };
  const blob = new Blob([JSON.stringify(fc, null, 2)], {type:'application/geo+json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

document.getElementById('exportBoundaryBtn').addEventListener('click', () => {
  if (boundaryFeatures.length === 0) { alert('No boundary features saved yet.'); return; }
  downloadGeoJSON(boundaryFeatures, 'boundary.geojson');
});
document.getElementById('exportRoadsBtn').addEventListener('click', () => {
  if (roadFeatures.length === 0) { alert('No road features saved yet.'); return; }
  downloadGeoJSON(roadFeatures, 'roads.geojson');
});
document.getElementById('clearAllBtn').addEventListener('click', () => {
  if (!confirm('This will permanently delete all saved boundary and road features. Continue?')) return;
  boundaryFeatures = []; roadFeatures = [];
  persist(); redrawSaved(); renderFeatureList();
});

// ---------- Init ----------
redrawSaved();
renderFeatureList();
</script>
</body>
</html>

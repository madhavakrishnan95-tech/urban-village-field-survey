<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Village Field Survey</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<style>
  html, body { margin:0; padding:0; height:100%; font-family: -apple-system, Arial, sans-serif; }
  #map { position:absolute; top:0; left:0; right:0; bottom:160px; }
  #panel { position:absolute; bottom:0; left:0; right:0; height:160px; background:#fff;
           border-top:2px solid #ccc; box-shadow:0 -2px 6px rgba(0,0,0,0.15); overflow-y:auto;
           box-sizing:border-box; padding:8px; z-index:1000; }
  .row { display:flex; gap:6px; flex-wrap:wrap; align-items:center; margin-bottom:6px; }
  select, button, input { font-size:15px; padding:8px 10px; border-radius:6px; border:1px solid #999; }
  button { cursor:pointer; background:#2c7be5; color:#fff; border:none; }
  button:disabled { background:#bbb; }
  button.secondary { background:#888; }
  button.danger { background:#d9534f; }
  #status { font-size:13px; color:#333; }
  #featureList { font-size:13px; max-height:55px; overflow-y:auto; border:1px solid #eee; padding:4px; border-radius:4px; }
  .feature-item { display:flex; justify-content:space-between; align-items:center; padding:2px 0; border-bottom:1px solid #f0f0f0; }
  .feature-item button { padding:2px 8px; font-size:12px; }

  /* Modal */
  #modalOverlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0;
                  background:rgba(0,0,0,0.4); z-index:2000; align-items:center; justify-content:center; }
  #modalBox { background:#fff; border-radius:8px; padding:16px; width:90%; max-width:380px; }
  #modalBox label { display:block; margin-top:8px; font-size:13px; font-weight:bold; }
  #modalBox input, #modalBox select, #modalBox textarea { width:100%; box-sizing:border-box; margin-top:4px; }
  #modalBox .row { margin-top:14px; justify-content:flex-end; }
  .checkbox-group { border:1px solid #eee; border-radius:6px; padding:6px; margin-top:4px; max-height:140px; overflow-y:auto; }
  #modalBox .checkbox-group label { display:flex; align-items:center; gap:6px; font-weight:normal; font-size:13px; margin:0; padding:3px 0; }
  #modalBox .checkbox-group input[type="checkbox"] { width:auto; margin:0; }
</style>
</head>
<body>

<div id="map"></div>

<div id="panel">
  <div class="row">
    <label for="modeSelect"><b>Layer:</b></label>
    <select id="modeSelect">
      <option value="boundary">Village Boundary (polygon)</option>
      <option value="roads">Road (line)</option>
      <option value="buildings">Building (point)</option>
      <option value="openspace">Open / Green Space (polygon)</option>
    </select>
    <button id="locateBtn" class="secondary">Locate me</button>
  </div>
  <div id="trackControls">
    <div class="row">
      <button id="recordBtn">Start Recording</button>
      <button id="pauseBtn" disabled>Pause</button>
      <button id="resumeBtn" disabled>Resume</button>
      <button id="finishBtn" disabled>Finish</button>
      <button id="cancelBtn" class="danger" disabled>Cancel</button>
    </div>
    <div class="row">
      <button id="addManualBtn" class="secondary" disabled>Add Manual Point</button>
      <button id="addSnapshotBtn" class="secondary" disabled>Add GPS Snapshot</button>
    </div>
  </div>
  <div class="row" id="buildingControls" style="display:none;">
    <button id="addBuildingTapBtn" class="secondary">Add Building (Tap Map)</button>
    <button id="addBuildingGpsBtn" class="secondary">Add Building (GPS)</button>
  </div>
  <div id="status">Ready. Select a layer and tap "Start Recording" to begin walking.</div>
  <div class="row" style="margin-top:6px;">
    <button id="exportBoundaryBtn" class="secondary">Export Boundary GeoJSON</button>
    <button id="exportRoadsBtn" class="secondary">Export Roads GeoJSON</button>
    <button id="exportBuildingsBtn" class="secondary">Export Buildings CSV</button>
    <button id="exportOpenSpaceBtn" class="secondary">Export Open Space GeoJSON</button>
    <button id="clearAllBtn" class="danger">Clear All Data</button>
  </div>
  <div id="featureList"></div>
</div>

<!-- Attribute entry modal -->
<div id="modalOverlay">
  <div id="modalBox">
    <h3 id="modalTitle" style="margin:0;">Feature details</h3>
    <div id="boundaryFields">
      <label>Name</label>
      <input type="text" id="f_bound_name" placeholder="e.g. Katwaria Sarai Abadi Boundary">
      <label>Remarks</label>
      <textarea id="f_bound_remarks" rows="2"></textarea>
    </div>
    <div id="roadFields" style="display:none;">
      <label>Road Name / Number</label>
      <input type="text" id="f_road_name" placeholder="e.g. Lane 3 / KS Main Road">
      <label>Width (meters)</label>
      <select id="f_width_m">
        <option value="" selected disabled>Select width</option>
        <option value="1">1 m</option>
        <option value="1.5">1.5 m</option>
        <option value="2">2 m</option>
        <option value="2.5">2.5 m</option>
        <option value="3">3 m</option>
        <option value="3.5">3.5 m</option>
        <option value="4">4 m</option>
        <option value="5">5 m</option>
        <option value="6">6 m</option>
        <option value="7">7 m</option>
        <option value="8">8 m</option>
        <option value="10">10 m</option>
        <option value="12">12 m</option>
        <option value="15">15 m</option>
        <option value="20">20 m</option>
      </select>
      <label>Road Type</label>
      <select id="f_road_type">
        <option>Main Road</option>
        <option>Internal Lane</option>
        <option>Footpath</option>
        <option>Service Road</option>
        <option>Other</option>
      </select>
      <label>Remarks</label>
      <textarea id="f_road_remarks" rows="2"></textarea>
    </div>
    <div id="openspaceFields" style="display:none;">
      <label>Park / Open Space Name or Number</label>
      <input type="text" id="f_os_name" placeholder="e.g. Park near Lane 4 / OS-1">
      <label>Type of Open Space</label>
      <select id="f_os_type">
        <option>Park / Garden</option>
        <option>Playground / Open Ground (Maidan)</option>
        <option>Parking Area</option>
        <option>Vacant Plot / Land</option>
        <option>Other</option>
      </select>
      <label>Tree Cover</label>
      <select id="f_os_trees">
        <option>No trees</option>
        <option>Few trees (1-5)</option>
        <option>Moderate (6-15)</option>
        <option>Dense green cover (15+)</option>
      </select>
      <label>Amenities (tick all that apply)</label>
      <div class="checkbox-group">
        <label><input type="checkbox" class="os-amenity" value="Walking track/path"> Walking track / path</label>
        <label><input type="checkbox" class="os-amenity" value="Play area"> Play area / playground equipment</label>
        <label><input type="checkbox" class="os-amenity" value="Open-air gym"> Open-air gym</label>
        <label><input type="checkbox" class="os-amenity" value="Seating/benches"> Seating / benches</label>
        <label><input type="checkbox" class="os-amenity" value="Religious structure"> Religious structure / shrine</label>
        <label><input type="checkbox" class="os-amenity" value="Drinking water"> Drinking water point</label>
        <label><input type="checkbox" class="os-amenity" value="Toilet"> Toilet</label>
        <label><input type="checkbox" class="os-amenity" value="Lighting"> Street lighting</label>
        <label><input type="checkbox" class="os-amenity" value="None"> None</label>
      </div>
      <label>Remarks</label>
      <textarea id="f_os_remarks" rows="2"></textarea>
    </div>
    <div id="buildingFields" style="display:none;">
      <label>Number of Floors</label>
      <select id="f_building_floors">
        <option value="1">G (Ground only)</option>
        <option value="2">G+1</option>
        <option value="3">G+2</option>
        <option value="4">G+3</option>
        <option value="5">G+4</option>
        <option value="6">G+5 or more</option>
      </select>
      <label>Building Use</label>
      <select id="f_building_use">
        <option>Residential</option>
        <option>Commercial</option>
        <option>Mixed (Residential + Commercial)</option>
        <option>Institutional</option>
        <option>Vacant / Under Construction</option>
        <option>Other</option>
      </select>
      <label>Number of Properties/Units Here</label>
      <select id="f_building_units">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5+</option>
      </select>
      <label>Approx. Plot Size (sq.m)</label>
      <input type="number" id="f_building_plotsize" min="0" step="1" placeholder="e.g. 45">
      <label>Remarks</label>
      <textarea id="f_building_remarks" rows="2"></textarea>
    </div>
    <div class="row">
      <button id="modalCancel" class="secondary">Discard</button>
      <button id="modalSave">Save</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script>
// ---------- Map setup ----------
const map = L.map('map').setView([28.5419, 77.1863], 17); // Katwaria Sarai
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 20,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

let currentMarker = null;

// Tap-to-place a manual point ("Add Manual Point") or a building point ("Add Building - Tap Map")
map.on('click', e => {
  if (manualPointMode) {
    addManualPoint([e.latlng.lat, e.latlng.lng], 'manual_tap');
    return;
  }
  if (buildingTapMode) {
    buildingTapMode = false;
    const btn = document.getElementById('addBuildingTapBtn');
    btn.textContent = 'Add Building (Tap Map)';
    btn.classList.remove('danger');
    openBuildingModal([e.latlng.lat, e.latlng.lng]);
  }
});

// ---------- State ----------
let mode = 'boundary';
let recording = false;
let watchId = null;
let currentTrack = []; // array of [lat, lon]
let liveLine = null;

let boundaryFeatures = JSON.parse(localStorage.getItem('boundaryFeatures') || '[]');
let roadFeatures = JSON.parse(localStorage.getItem('roadFeatures') || '[]');
let buildingFeatures = JSON.parse(localStorage.getItem('buildingFeatures') || '[]');
let openspaceFeatures = JSON.parse(localStorage.getItem('openspaceFeatures') || '[]');
let savedLayers = [];

let manualPointMode = false; // true while "Add Manual Point" (map-tap) is armed
let manualMarkers = [];       // markers for manually-added/snapshot points in the current feature

let buildingTapMode = false;  // true while "Add Building (Tap Map)" is armed
let pendingBuildingLL = null; // [lat,lon] awaiting building attribute save
let modalContext = 'feature'; // 'feature' (boundary/road track) or 'building'

const MIN_DISTANCE_M = 2;       // minimum movement before adding a new track point
const MAX_ACCURACY_M = 25;      // ignore GPS readings worse than this during recording
const PRECISE_TARGET_M = 8;     // one-shot capture: stop collecting if accuracy reaches this
const PRECISE_TIMEOUT_MS = 10000; // one-shot capture: give up after this many ms

// ---------- Helpers ----------
function haversine(a, b) {
  const R = 6371000;
  const toRad = x => x * Math.PI / 180;
  const dLat = toRad(b[0]-a[0]);
  const dLon = toRad(b[1]-a[1]);
  const lat1 = toRad(a[0]), lat2 = toRad(b[0]);
  const h = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

// High-precision one-shot position: watches for up to PRECISE_TIMEOUT_MS,
// keeps the best reading seen, stops early if accuracy <= PRECISE_TARGET_M.
function getPrecisePosition(onSuccess, onError, statusPrefix) {
  let best = null;
  let wid = null;
  const timer = setTimeout(() => {
    navigator.geolocation.clearWatch(wid);
    if (best) onSuccess(best);
    else onError(new Error('Could not get a precise location in time. Try moving to an open area.'));
  }, PRECISE_TIMEOUT_MS);
  wid = navigator.geolocation.watchPosition(pos => {
    if (!best || pos.coords.accuracy < best.coords.accuracy) {
      best = pos;
      if (statusPrefix) setStatus(`${statusPrefix} — accuracy: ${pos.coords.accuracy.toFixed(1)} m`);
    }
    if (pos.coords.accuracy <= PRECISE_TARGET_M) {
      clearTimeout(timer);
      navigator.geolocation.clearWatch(wid);
      onSuccess(best);
    }
  }, err => {
    clearTimeout(timer);
    navigator.geolocation.clearWatch(wid);
    onError(err);
  }, { enableHighAccuracy: true, maximumAge: 0, timeout: 30000 });
}

function redrawSaved() {
  savedLayers.forEach(l => map.removeLayer(l));
  savedLayers = [];
  boundaryFeatures.forEach(f => {
    const latlngs = f.geometry.coordinates[0].map(c => [c[1], c[0]]);
    const poly = L.polygon(latlngs, {color:'green', weight:2, fillOpacity:0.1}).addTo(map);
    poly.bindPopup(`<b>${f.properties.bound_name || '(unnamed)'}</b><br>${f.properties.remarks || ''}`);
    savedLayers.push(poly);
  });
  roadFeatures.forEach(f => {
    const latlngs = f.geometry.coordinates.map(c => [c[1], c[0]]);
    const line = L.polyline(latlngs, {color:'red', weight:3}).addTo(map);
    line.bindPopup(`<b>${f.properties.road_name || '(unnamed)'}</b><br>Type: ${f.properties.road_type}<br>Width: ${f.properties.width_m} m<br>${f.properties.remarks || ''}`);
    savedLayers.push(line);
  });
  buildingFeatures.forEach(f => {
    const ll = [f.geometry.coordinates[1], f.geometry.coordinates[0]];
    const floorLabel = floorsToLabel(f.properties.floors);
    const marker = L.circleMarker(ll, {radius:5, color:'darkorange', fillColor:'orange', fillOpacity:0.9}).addTo(map);
    const plotSizeStr = (f.properties.plot_size_sqm !== null && f.properties.plot_size_sqm !== undefined) ? `${f.properties.plot_size_sqm} sq.m` : 'Not recorded';
    marker.bindPopup(`<b>Building (${floorLabel})</b><br>Use: ${f.properties.bldg_use}<br>Units: ${f.properties.units}<br>Plot size: ${plotSizeStr}<br>${f.properties.remarks || ''}`);
    savedLayers.push(marker);
  });
  openspaceFeatures.forEach(f => {
    const latlngs = f.geometry.coordinates[0].map(c => [c[1], c[0]]);
    const poly = L.polygon(latlngs, {color:'teal', weight:2, fillColor:'lightgreen', fillOpacity:0.35}).addTo(map);
    const amenitiesStr = (f.properties.amenities && f.properties.amenities.length) ? f.properties.amenities.join(', ') : 'None';
    poly.bindPopup(`<b>${f.properties.os_name || '(unnamed)'}</b><br>Type: ${f.properties.os_type}<br>Trees: ${f.properties.tree_cover}<br>Amenities: ${amenitiesStr}<br>${f.properties.remarks || ''}`);
    savedLayers.push(poly);
  });
}

function floorsToLabel(floors) {
  return floors === 1 ? 'G' : `G+${floors - 1}`;
}

function renderFeatureList() {
  const el = document.getElementById('featureList');
  let html = '';
  boundaryFeatures.forEach((f, i) => {
    html += `<div class="feature-item"><span>[Boundary] ${f.properties.bound_name || '(unnamed)'}</span><button onclick="deleteFeature('boundary',${i})">Delete</button></div>`;
  });
  roadFeatures.forEach((f, i) => {
    html += `<div class="feature-item"><span>[Road] ${f.properties.road_name || '(unnamed)'} (${f.properties.road_type}, ${f.properties.width_m}m)</span><button onclick="deleteFeature('roads',${i})">Delete</button></div>`;
  });
  buildingFeatures.forEach((f, i) => {
    const plotSizeLabel = (f.properties.plot_size_sqm !== null && f.properties.plot_size_sqm !== undefined) ? `, ${f.properties.plot_size_sqm} sq.m` : '';
    html += `<div class="feature-item"><span>[Building] ${floorsToLabel(f.properties.floors)}, ${f.properties.bldg_use}, ${f.properties.units} unit(s)${plotSizeLabel}</span><button onclick="deleteFeature('buildings',${i})">Delete</button></div>`;
  });
  openspaceFeatures.forEach((f, i) => {
    html += `<div class="feature-item"><span>[Open Space] ${f.properties.os_name || '(unnamed)'} (${f.properties.os_type})</span><button onclick="deleteFeature('openspace',${i})">Delete</button></div>`;
  });
  el.innerHTML = html || '<i>No features saved yet.</i>';
}

function deleteFeature(layer, idx) {
  if (!confirm('Delete this feature?')) return;
  if (layer === 'boundary') boundaryFeatures.splice(idx,1);
  else if (layer === 'roads') roadFeatures.splice(idx,1);
  else if (layer === 'buildings') buildingFeatures.splice(idx,1);
  else openspaceFeatures.splice(idx,1);
  persist();
  redrawSaved();
  renderFeatureList();
}

function persist() {
  localStorage.setItem('boundaryFeatures', JSON.stringify(boundaryFeatures));
  localStorage.setItem('roadFeatures', JSON.stringify(roadFeatures));
  localStorage.setItem('buildingFeatures', JSON.stringify(buildingFeatures));
  localStorage.setItem('openspaceFeatures', JSON.stringify(openspaceFeatures));
}

function todayStr() {
  return new Date().toISOString().slice(0,10);
}

// Append a manually-placed or GPS-snapshot point to the current track
// (only used while recording is paused, so it can't race with watchPosition)
function addManualPoint(ll, source) {
  currentTrack.push(ll);
  if (!liveLine) {
    liveLine = L.polyline([], {color:'orange', weight:4, dashArray:'4,4'}).addTo(map);
  }
  liveLine.setLatLngs(currentTrack);

  const isSnapshot = source === 'gps_snapshot';
  const marker = L.circleMarker(ll, {
    radius: 7,
    color: isSnapshot ? 'darkgreen' : 'purple',
    fillColor: isSnapshot ? 'darkgreen' : 'purple',
    fillOpacity: 0.9
  }).addTo(map);
  marker.bindPopup(isSnapshot ? 'GPS snapshot point' : 'Manual point (map tap)');
  manualMarkers.push(marker);

  setStatus(`${isSnapshot ? 'GPS snapshot' : 'Manual point'} added (${ll[0].toFixed(6)}, ${ll[1].toFixed(6)}). ${currentTrack.length} points total. Add more, or tap Resume / Finish.`);
}

// ---------- Recording controls ----------
document.getElementById('modeSelect').addEventListener('change', e => {
  mode = e.target.value;
  const isBuilding = mode === 'buildings';
  document.getElementById('trackControls').style.display = isBuilding ? 'none' : '';
  document.getElementById('buildingControls').style.display = isBuilding ? 'flex' : 'none';
  setStatus(isBuilding
    ? 'Building mode: tap "Add Building (Tap Map)" or "Add Building (GPS)" for each building you pass.'
    : 'Ready. Select a layer and tap "Start Recording" to begin walking.');
});

document.getElementById('locateBtn').addEventListener('click', () => {
  if (!navigator.geolocation) { alert('Geolocation not supported in this browser.'); return; }
  const btn = document.getElementById('locateBtn');
  btn.disabled = true;
  btn.textContent = 'Locating…';
  setStatus('Getting precise location — please wait (up to 10 s)…');
  getPrecisePosition(pos => {
    btn.disabled = false;
    btn.textContent = 'Locate me';
    const ll = [pos.coords.latitude, pos.coords.longitude];
    map.setView(ll, 19);
    if (currentMarker) map.removeLayer(currentMarker);
    currentMarker = L.circleMarker(ll, {radius:10, color:'#1a56cc', fillColor:'#4d90fe', fillOpacity:0.85})
      .addTo(map).bindPopup(`Your location<br><b>Accuracy: ${pos.coords.accuracy.toFixed(1)} m</b>`).openPopup();
    setStatus(`Located! Accuracy: ${pos.coords.accuracy.toFixed(1)} m`);
  }, err => {
    btn.disabled = false;
    btn.textContent = 'Locate me';
    setStatus('Location error: ' + err.message);
  }, 'Scanning for best GPS signal');
});

document.getElementById('recordBtn').addEventListener('click', startRecording);
document.getElementById('pauseBtn').addEventListener('click', pauseRecording);
document.getElementById('resumeBtn').addEventListener('click', startRecording);
document.getElementById('finishBtn').addEventListener('click', finishRecording);
document.getElementById('cancelBtn').addEventListener('click', cancelRecording);

document.getElementById('addManualBtn').addEventListener('click', () => {
  const btn = document.getElementById('addManualBtn');
  manualPointMode = !manualPointMode;
  if (manualPointMode) {
    btn.textContent = 'Tap map to place point (tap again to stop)';
    btn.classList.add('danger');
    setStatus('Manual point mode ON — tap the map where the boundary/road continues. Tap this button again to turn off.');
  } else {
    btn.textContent = 'Add Manual Point';
    btn.classList.remove('danger');
    setStatus(`Paused. ${currentTrack.length} points captured so far. Tap Resume to continue, or Finish to end this feature.`);
  }
});

document.getElementById('addSnapshotBtn').addEventListener('click', () => {
  if (!navigator.geolocation) { alert('Geolocation not supported in this browser.'); return; }
  const btn = document.getElementById('addSnapshotBtn');
  btn.disabled = true;
  btn.textContent = 'Getting precise fix…';
  getPrecisePosition(pos => {
    btn.disabled = false;
    btn.textContent = 'Add GPS Snapshot';
    addManualPoint([pos.coords.latitude, pos.coords.longitude], 'gps_snapshot');
  }, err => {
    btn.disabled = false;
    btn.textContent = 'Add GPS Snapshot';
    setStatus('GPS error: ' + err.message);
  }, 'GPS Snapshot — scanning');
});

// ---------- Building point capture ----------
document.getElementById('addBuildingTapBtn').addEventListener('click', () => {
  const btn = document.getElementById('addBuildingTapBtn');
  buildingTapMode = !buildingTapMode;
  if (buildingTapMode) {
    btn.textContent = 'Tap the map on the building (tap again to cancel)';
    btn.classList.add('danger');
    setStatus('Tap the map at the building location.');
  } else {
    btn.textContent = 'Add Building (Tap Map)';
    btn.classList.remove('danger');
    setStatus('Building mode: tap "Add Building (Tap Map)" or "Add Building (GPS)" for each building you pass.');
  }
});

document.getElementById('addBuildingGpsBtn').addEventListener('click', () => {
  if (!navigator.geolocation) { alert('Geolocation not supported in this browser.'); return; }
  const btn = document.getElementById('addBuildingGpsBtn');
  btn.disabled = true;
  btn.textContent = 'Getting precise fix…';
  setStatus('Getting precise GPS position for building — please wait…');
  getPrecisePosition(pos => {
    btn.disabled = false;
    btn.textContent = 'Add Building (GPS)';
    openBuildingModal([pos.coords.latitude, pos.coords.longitude]);
  }, err => {
    btn.disabled = false;
    btn.textContent = 'Add Building (GPS)';
    setStatus('GPS error: ' + err.message);
  }, 'Building GPS — scanning');
});

function openBuildingModal(ll) {
  pendingBuildingLL = ll;
  modalContext = 'building';
  document.getElementById('modalOverlay').style.display = 'flex';
  document.getElementById('modalTitle').textContent = 'Building details';
  document.getElementById('boundaryFields').style.display = 'none';
  document.getElementById('roadFields').style.display = 'none';
  document.getElementById('openspaceFields').style.display = 'none';
  document.getElementById('buildingFields').style.display = 'block';
}

function startRecording() {
  if (!navigator.geolocation) { alert('Geolocation not supported in this browser.'); return; }
  recording = true;
  document.getElementById('recordBtn').disabled = true;
  document.getElementById('pauseBtn').disabled = false;
  document.getElementById('resumeBtn').disabled = true;
  document.getElementById('finishBtn').disabled = false;
  document.getElementById('cancelBtn').disabled = false;
  document.getElementById('modeSelect').disabled = true;

  // manual point / snapshot tools are only usable while paused
  manualPointMode = false;
  const addManualBtn = document.getElementById('addManualBtn');
  addManualBtn.textContent = 'Add Manual Point';
  addManualBtn.classList.remove('danger');
  addManualBtn.disabled = true;
  document.getElementById('addSnapshotBtn').disabled = true;

  if (!liveLine) {
    liveLine = L.polyline([], {color:'orange', weight:4, dashArray:'4,4'}).addTo(map);
  }

  watchId = navigator.geolocation.watchPosition(pos => {
    const acc = pos.coords.accuracy;

    // Reject readings with very poor accuracy (multipath noise in narrow lanes)
    if (acc > MAX_ACCURACY_M) {
      setStatus(`Weak GPS signal (${acc.toFixed(0)} m) — waiting for better fix… ${currentTrack.length} pts so far.`);
      return;
    }

    const ll = [pos.coords.latitude, pos.coords.longitude];
    if (currentMarker) map.removeLayer(currentMarker);
    currentMarker = L.circleMarker(ll, {radius:6, color:'blue'}).addTo(map);

    if (currentTrack.length === 0 || haversine(currentTrack[currentTrack.length-1], ll) >= MIN_DISTANCE_M) {
      currentTrack.push(ll);
      liveLine.setLatLngs(currentTrack);
      map.panTo(ll);
    }
    setStatus(`Recording ${mode}… ${currentTrack.length} pts captured. Accuracy: ${acc.toFixed(1)} m`);
  }, err => {
    setStatus('GPS error: ' + err.message);
  }, { enableHighAccuracy: true, maximumAge: 0, timeout: 30000 });
}

function pauseRecording() {
  if (watchId !== null) navigator.geolocation.clearWatch(watchId);
  watchId = null;
  document.getElementById('pauseBtn').disabled = true;
  document.getElementById('resumeBtn').disabled = false;
  document.getElementById('addManualBtn').disabled = false;
  document.getElementById('addSnapshotBtn').disabled = false;
  setStatus(`Paused. ${currentTrack.length} points captured so far. To bridge an obstacle, use "Add Manual Point" (tap the map) or "Add GPS Snapshot" (your current location), then tap Resume to continue, or Finish to end this feature.`);
}

function cancelRecording() {
  if (watchId !== null) navigator.geolocation.clearWatch(watchId);
  watchId = null;
  recording = false;
  currentTrack = [];
  if (liveLine) { map.removeLayer(liveLine); liveLine = null; }
  resetButtons();
  setStatus('Cancelled. Ready to start again.');
}

function resetButtons() {
  document.getElementById('recordBtn').disabled = false;
  document.getElementById('recordBtn').textContent = 'Start Recording';
  document.getElementById('pauseBtn').disabled = true;
  document.getElementById('resumeBtn').disabled = true;
  document.getElementById('finishBtn').disabled = true;
  document.getElementById('cancelBtn').disabled = true;
  document.getElementById('modeSelect').disabled = false;

  // manual point / snapshot tools
  manualPointMode = false;
  const addManualBtn = document.getElementById('addManualBtn');
  addManualBtn.textContent = 'Add Manual Point';
  addManualBtn.classList.remove('danger');
  addManualBtn.disabled = true;
  document.getElementById('addSnapshotBtn').disabled = true;

  // clear any manual/snapshot markers from the finished/cancelled feature
  manualMarkers.forEach(m => map.removeLayer(m));
  manualMarkers = [];
}

function finishRecording() {
  if (watchId !== null) navigator.geolocation.clearWatch(watchId);
  watchId = null;
  if (currentTrack.length < ((mode === 'boundary' || mode === 'openspace') ? 3 : 2)) {
    alert(`Not enough points captured yet (${currentTrack.length}). Keep walking and recording.`);
    // re-arm watch
    startRecording();
    return;
  }
  openModal();
}

// ---------- Attribute modal ----------
function openModal() {
  modalContext = 'feature';
  document.getElementById('modalOverlay').style.display = 'flex';
  document.getElementById('buildingFields').style.display = 'none';
  document.getElementById('boundaryFields').style.display = 'none';
  document.getElementById('roadFields').style.display = 'none';
  document.getElementById('openspaceFields').style.display = 'none';
  if (mode === 'boundary') {
    document.getElementById('modalTitle').textContent = 'Boundary details';
    document.getElementById('boundaryFields').style.display = 'block';
  } else if (mode === 'openspace') {
    document.getElementById('modalTitle').textContent = 'Open / Green Space details';
    document.getElementById('openspaceFields').style.display = 'block';
  } else {
    document.getElementById('modalTitle').textContent = 'Road details';
    document.getElementById('roadFields').style.display = 'block';
  }
}

function closeModal() {
  document.getElementById('modalOverlay').style.display = 'none';
}

document.getElementById('modalCancel').addEventListener('click', () => {
  closeModal();
  if (modalContext === 'building') {
    pendingBuildingLL = null;
  } else {
    cancelRecording();
  }
});

document.getElementById('modalSave').addEventListener('click', () => {
  if (modalContext === 'building') {
    const feature = {
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [pendingBuildingLL[1], pendingBuildingLL[0]] },
      properties: {
        floors: parseInt(document.getElementById('f_building_floors').value, 10),
        bldg_use: document.getElementById('f_building_use').value,
        units: parseInt(document.getElementById('f_building_units').value, 10),
        plot_size_sqm: document.getElementById('f_building_plotsize').value ? parseFloat(document.getElementById('f_building_plotsize').value) : null,
        remarks: document.getElementById('f_building_remarks').value || '',
        date_cap: todayStr()
      }
    };
    buildingFeatures.push(feature);
    persist();
    redrawSaved();
    renderFeatureList();
    document.getElementById('f_building_remarks').value = '';
    document.getElementById('f_building_plotsize').value = '';
    pendingBuildingLL = null;
    closeModal();
    setStatus(`Building saved (${floorsToLabel(feature.properties.floors)}, ${feature.properties.bldg_use}, ${feature.properties.units} unit(s)). Tap "Add Building" for the next one.`);
    return;
  }
  if (mode === 'boundary') {
    let coords = currentTrack.map(c => [c[1], c[0]]); // lon, lat
    if (coords.length > 0 && (coords[0][0] !== coords[coords.length-1][0] || coords[0][1] !== coords[coords.length-1][1])) {
      coords.push(coords[0]); // close the ring
    }
    const feature = {
      type: 'Feature',
      geometry: { type: 'Polygon', coordinates: [coords] },
      properties: {
        bound_name: document.getElementById('f_bound_name').value || '',
        remarks: document.getElementById('f_bound_remarks').value || '',
        date_cap: todayStr()
      }
    };
    boundaryFeatures.push(feature);
  } else if (mode === 'openspace') {
    let coords = currentTrack.map(c => [c[1], c[0]]); // lon, lat
    if (coords.length > 0 && (coords[0][0] !== coords[coords.length-1][0] || coords[0][1] !== coords[coords.length-1][1])) {
      coords.push(coords[0]); // close the ring
    }
    const amenities = Array.from(document.querySelectorAll('.os-amenity:checked')).map(cb => cb.value);
    const feature = {
      type: 'Feature',
      geometry: { type: 'Polygon', coordinates: [coords] },
      properties: {
        os_name: document.getElementById('f_os_name').value || '',
        os_type: document.getElementById('f_os_type').value,
        tree_cover: document.getElementById('f_os_trees').value,
        amenities: amenities,
        remarks: document.getElementById('f_os_remarks').value || '',
        date_cap: todayStr()
      }
    };
    openspaceFeatures.push(feature);
  } else {
    const coords = currentTrack.map(c => [c[1], c[0]]); // lon, lat
    const feature = {
      type: 'Feature',
      geometry: { type: 'LineString', coordinates: coords },
      properties: {
        road_name: document.getElementById('f_road_name').value || '',
        width_m: parseFloat(document.getElementById('f_width_m').value) || 0,
        road_type: document.getElementById('f_road_type').value,
        remarks: document.getElementById('f_road_remarks').value || '',
        date_cap: todayStr()
      }
    };
    roadFeatures.push(feature);
  }
  persist();
  redrawSaved();
  renderFeatureList();

  // reset form + state
  document.getElementById('f_bound_name').value = '';
  document.getElementById('f_bound_remarks').value = '';
  document.getElementById('f_road_name').value = '';
  document.getElementById('f_width_m').value = '';
  document.getElementById('f_road_remarks').value = '';
  document.getElementById('f_os_name').value = '';
  document.getElementById('f_os_type').selectedIndex = 0;
  document.getElementById('f_os_trees').selectedIndex = 0;
  document.querySelectorAll('.os-amenity').forEach(cb => cb.checked = false);
  document.getElementById('f_os_remarks').value = '';
  currentTrack = [];
  if (liveLine) { map.removeLayer(liveLine); liveLine = null; }
  closeModal();
  resetButtons();
  setStatus('Saved! Ready to record the next feature.');
});

// ---------- Export ----------
// Tries the native share sheet first (so on a phone you can pick "Save to Drive"
// directly). Falls back to a normal browser download if sharing files isn't
// supported (e.g. on desktop) or the user cancels the share with an error.
async function shareOrDownloadBlob(blob, filename, mimeType) {
  try {
    const file = new File([blob], filename, {type: mimeType});
    if (navigator.canShare && navigator.canShare({files: [file]})) {
      await navigator.share({files: [file], title: filename});
      return;
    }
  } catch (err) {
    if (err && err.name === 'AbortError') return; // user cancelled the share sheet
    // otherwise fall through to download
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function downloadGeoJSON(features, filename) {
  const fc = { type: 'FeatureCollection', features: features };
  const blob = new Blob([JSON.stringify(fc, null, 2)], {type:'application/geo+json'});
  shareOrDownloadBlob(blob, filename, 'application/geo+json');
}

function downloadCSV(rows, headers, filename) {
  const escapeCell = (val) => {
    if (val === null || val === undefined) return '';
    const str = String(val);
    if (/[",\n]/.test(str)) {
      return '"' + str.replace(/"/g, '""') + '"';
    }
    return str;
  };
  const lines = [headers.join(',')];
  rows.forEach(r => lines.push(headers.map(h => escapeCell(r[h])).join(',')));
  const blob = new Blob([lines.join('\n')], {type:'text/csv'});
  shareOrDownloadBlob(blob, filename, 'text/csv');
}

document.getElementById('exportBoundaryBtn').addEventListener('click', () => {
  if (boundaryFeatures.length === 0) { alert('No boundary features saved yet.'); return; }
  downloadGeoJSON(boundaryFeatures, `boundary_${todayStr()}.geojson`);
});
document.getElementById('exportRoadsBtn').addEventListener('click', () => {
  if (roadFeatures.length === 0) { alert('No road features saved yet.'); return; }
  downloadGeoJSON(roadFeatures, `roads_${todayStr()}.geojson`);
});
document.getElementById('exportBuildingsBtn').addEventListener('click', () => {
  if (buildingFeatures.length === 0) { alert('No building features saved yet.'); return; }
  const headers = ['lat','lon','floors','floor_label','bldg_use','units','plot_size_sqm','remarks','date_cap'];
  const rows = buildingFeatures.map(f => ({
    lat: f.geometry.coordinates[1],
    lon: f.geometry.coordinates[0],
    floors: f.properties.floors,
    floor_label: floorsToLabel(f.properties.floors),
    bldg_use: f.properties.bldg_use,
    units: f.properties.units,
    plot_size_sqm: (f.properties.plot_size_sqm !== null && f.properties.plot_size_sqm !== undefined) ? f.properties.plot_size_sqm : '',
    remarks: f.properties.remarks || '',
    date_cap: f.properties.date_cap || ''
  }));
  downloadCSV(rows, headers, `buildings_${todayStr()}.csv`);
});
document.getElementById('exportOpenSpaceBtn').addEventListener('click', () => {
  if (openspaceFeatures.length === 0) { alert('No open space features saved yet.'); return; }
  downloadGeoJSON(openspaceFeatures, `openspace_${todayStr()}.geojson`);
});
document.getElementById('clearAllBtn').addEventListener('click', () => {
  if (!confirm('This will permanently delete all saved boundary, road, building, and open space features. Continue?')) return;
  boundaryFeatures = []; roadFeatures = []; buildingFeatures = []; openspaceFeatures = [];
  persist(); redrawSaved(); renderFeatureList();
});

// ---------- Init ----------
redrawSaved();
renderFeatureList();
</script>
